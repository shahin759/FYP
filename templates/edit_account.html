<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seeker - Job Listings</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='edit_account.css') }}">
  <link rel="icon" href="{{ url_for('static', filename='logo.png') }}">
  
</head>

<body>
  {% include 'navbar.html' %}
  {% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <div class="flash-container">
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}
        </div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}
<h1>Update your account details</h1>


<form method="POST" action="{{ url_for('edit_account') }}">
  <input type="hidden" name="action" value="update_email">
  <label>Email</label>
  <input type="email" id="email" name="email" class="entrybox" value="{{ user.email }}" required>
  <button type="submit" class="loged">Update Email</button>
</form>

<form method="POST" action="{{ url_for('edit_account') }}">
  <input type="hidden" name="action" value="update_password">
  <input type="password" id="password" name="password" class="entrybox"  placeholder="Confirm Password"required>
  <br>
  <input type="password" id="password" name="confirm_password" class="entrybox" placeholder="Confirm Password" required>
  <button type="submit" class="loged">Update password</button>
</form>
{%include 'footer.html'%}
<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>


</html>
